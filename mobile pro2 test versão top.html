<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle de Atividades</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Segoe UI',Arial;
background:#edf1f5;
color:#333;
}

/* HEADER */

.header{
background:linear-gradient(120deg,#1f4037,#2c5364);
color:white;
text-align:center;
padding:18px;
font-size:20px;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

/* CONTAINER */

.container{
padding:12px;
max-width:900px;
margin:auto;
}

/* CARD */

.card{
background:white;
border-radius:14px;
padding:18px;
margin-bottom:15px;
box-shadow:0 5px 18px rgba(0,0,0,0.08);
animation:fade .4s;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

/* INPUTS */

label{
font-size:13px;
font-weight:bold;
}

input,select{
width:100%;
padding:13px;
margin-top:6px;
margin-bottom:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
transition:0.2s;
}

input:focus,select:focus{
border-color:#2c5364;
outline:none;
box-shadow:0 0 0 2px rgba(44,83,100,0.15);
}

/* BOTÕES */

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:15px;
font-weight:bold;
cursor:pointer;
margin-top:6px;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

button:active{
transform:scale(0.97);
}

.btn-start{
background:#27ae60;
color:white;
}

.btn-end{
background:#f39c12;
color:white;
}

.btn-pdf{
background:#2980b9;
color:white;
}

.btn-delete{
background:#e74c3c;
color:white;
padding:6px 8px;
font-size:12px;
border-radius:6px;
}

/* STATUS */

.status{
background:#f3f6f9;
padding:10px;
border-radius:8px;
font-size:14px;
margin-bottom:12px;
}

/* TABELA */

.table-container{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:650px;
}

th{
background:#2c5364;
color:white;
padding:10px;
font-size:13px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
font-size:13px;
text-align:center;
}

tr:nth-child(even){
background:#f7f9fb;
}

/* MOBILE EXTRA */

@media(max-width:600px){

.header{
font-size:18px;
padding:15px;
}

button{
font-size:14px;
padding:13px;
}

}

</style>

</head>

<body>

<div class="header">
<i class="fa-solid fa-clipboard-list"></i> Controle de Atividades
</div>

<div class="container">

<div class="card">

<div class="status" id="status">
Nenhuma atividade em andamento
</div>

<label>Matrícula</label>
<input type="text" id="matricula">

<label>Colaborador</label>
<input type="text" id="nome">

<label>Atividade</label>
<select id="atividade">
<option>Manutenção</option>
<option>Inspeção</option>
<option>5S</option>
<option>Reunião</option>
</select>

<button class="btn-start" onclick="iniciar()">
<i class="fa-solid fa-play"></i> Iniciar Atividade
</button>

<button class="btn-end" onclick="finalizar()">
<i class="fa-solid fa-stop"></i> Finalizar Atividade
</button>

<button class="btn-pdf" onclick="gerarPDF()">
<i class="fa-solid fa-file-pdf"></i> Gerar PDF
</button>

</div>

<div class="card">

<div class="table-container">

<table id="tabela">

<tr>
<th>Data</th>
<th>Matrícula</th>
<th>Nome</th>
<th>Atividade</th>
<th>Início</th>
<th>Fim</th>
<th>Duração</th>
<th>Ação</th>
</tr>

</table>

</div>

</div>

</div>

<script>

let registros=[];
let atividadeAtual=null;

function iniciar(){

if(atividadeAtual){
alert("Finalize a atividade atual primeiro");
return;
}

let matricula=document.getElementById("matricula").value;
let nome=document.getElementById("nome").value;
let atividade=document.getElementById("atividade").value;

if(!matricula || !nome){
alert("Preencha matrícula e nome");
return;
}

let agora=new Date();

atividadeAtual={
data:agora.toLocaleDateString(),
inicio:agora.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
inicioMin:agora.getHours()*60+agora.getMinutes(),
matricula,
nome,
atividade
};

document.getElementById("status").innerHTML=
"🔵 Atividade em andamento: <b>"+atividade+"</b>";

}

function finalizar(){

if(!atividadeAtual){
alert("Nenhuma atividade iniciada");
return;
}

let agora=new Date();

let fim=agora.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
let fimMin=agora.getHours()*60+agora.getMinutes();

let duracao=(fimMin-atividadeAtual.inicioMin)+" min";

let registro={
data:atividadeAtual.data,
matricula:atividadeAtual.matricula,
nome:atividadeAtual.nome,
atividade:atividadeAtual.atividade,
inicio:atividadeAtual.inicio,
fim:fim,
duracao:duracao
};

registros.push(registro);

atividadeAtual=null;

document.getElementById("status").innerHTML="Nenhuma atividade em andamento";

atualizar();

}

function atualizar(){

let tabela=document.getElementById("tabela");

tabela.innerHTML=`

<tr>
<th>Data</th>
<th>Matrícula</th>
<th>Nome</th>
<th>Atividade</th>
<th>Início</th>
<th>Fim</th>
<th>Duração</th>
<th>Ação</th>
</tr>

`;

registros.forEach((r,index)=>{

let linha=tabela.insertRow();

linha.insertCell(0).innerText=r.data;
linha.insertCell(1).innerText=r.matricula;
linha.insertCell(2).innerText=r.nome;
linha.insertCell(3).innerText=r.atividade;
linha.insertCell(4).innerText=r.inicio;
linha.insertCell(5).innerText=r.fim;
linha.insertCell(6).innerText=r.duracao;

let botao=document.createElement("button");
botao.innerHTML="🗑";
botao.className="btn-delete";
botao.onclick=function(){apagar(index)}

linha.insertCell(7).appendChild(botao);

});

}

function apagar(index){

if(confirm("Excluir este registro?")){

registros.splice(index,1);

atualizar();

}

}

function gerarPDF(){

const { jsPDF } = window.jspdf;

let doc = new jsPDF();

let pageWidth = doc.internal.pageSize.getWidth();

let dataRelatorio = new Date().toLocaleString();

let totalMinutos = 0;


// SOMAR MINUTOS
registros.forEach(r=>{
let m = parseInt(r.duracao);
if(!isNaN(m)) totalMinutos += m;
});

let totalHoras = (totalMinutos/60).toFixed(2);


// CABEÇALHO
doc.setFillColor(20,40,80);
doc.rect(0,0,pageWidth,35,"F");

doc.setTextColor(255);
doc.setFontSize(22);
doc.text("RELATÓRIO DE ATIVIDADES",pageWidth/2,18,{align:"center"});

doc.setFontSize(11);
doc.text("Sistema de Controle Operacional",pageWidth/2,28,{align:"center"});


// DATA
doc.setTextColor(70);
doc.setFontSize(10);
doc.text("Data de geração: "+dataRelatorio,10,45);


// LINHA
doc.setDrawColor(200);
doc.line(10,48,pageWidth-10,48);


// CABEÇALHO DA TABELA
let y = 60;

doc.setFillColor(44,83,100);
doc.rect(10,y-7,190,9,"F");

doc.setTextColor(255);
doc.setFontSize(9);

doc.text("Data",12,y);
doc.text("Matrícula",32,y);
doc.text("Nome",60,y);
doc.text("Atividade",105,y);
doc.text("Início",145,y);
doc.text("Fim",165,y);
doc.text("Duração",182,y);

y+=10;

doc.setTextColor(0);


// DADOS
registros.forEach((r,i)=>{

if(i%2==0){
doc.setFillColor(245,245,245);
doc.rect(10,y-6,190,8,"F");
}

doc.text(r.data,12,y);
doc.text(r.matricula,32,y);
doc.text(r.nome.substring(0,18),60,y);
doc.text(r.atividade,105,y);
doc.text(r.inicio,145,y);
doc.text(r.fim,165,y);
doc.text(r.duracao,182,y);

y+=8;

if(y>270){
doc.addPage();
y=20;
}

});


// RESUMO
y+=10;

doc.setDrawColor(200);
doc.line(10,y,pageWidth-10,y);

y+=10;

doc.setFontSize(12);
doc.setTextColor(30);
doc.text("RESUMO OPERACIONAL",10,y);

y+=8;

doc.setFontSize(10);

doc.text("Total de atividades registradas: "+registros.length,10,y);
y+=6;

doc.text("Tempo total trabalhado: "+totalMinutos+" minutos",10,y);
y+=6;

doc.text("Total em horas: "+totalHoras+" h",10,y);


// CAIXA DE RESUMO
doc.setDrawColor(180);
doc.rect(pageWidth-80,y-20,70,25);

doc.setFontSize(9);

doc.text("Indicadores:",pageWidth-75,y-15);
doc.text("Atividades: "+registros.length,pageWidth-75,y-9);
doc.text("Minutos: "+totalMinutos,pageWidth-75,y-3);
doc.text("Horas: "+totalHoras,pageWidth-75,y+3);


// RODAPÉ
doc.setFontSize(8);
doc.setTextColor(120);

doc.line(10,285,pageWidth-10,285);

doc.text(
"Documento gerado automaticamente pelo Sistema de Controle de Atividades",
pageWidth/2,
290,
{align:"center"}
);

doc.save("relatorio_atividades_profissional.pdf");

}

</script>

</body>
</html>
